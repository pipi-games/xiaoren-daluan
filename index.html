<meta property="og:description" content="5 个角色，废墟峡谷横版对战！">
<title>小人大乱斗</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; font-family: -apple-system, sans-serif; user-select: none; }
canvas { display: block; position: fixed; top: 0; left: 0; image-rendering: pixelated; }
#ui { position: fixed; top: 0; left: 0; width: 100%; pointer-events: none; z-index: 10; }
#ui .hud { display: flex; justify-content: center; gap: 24px; padding: 10px; }
.char-hud { background: rgba(0,0,0,0.55); border-radius: 10px; padding: 6px 14px; min-width: 160px; }
.char-hud .name { font-size: 14px; font-weight: bold; color: #fff; margin-bottom: 4px; }
.char-hud .hp-bar { height: 10px; background: #333; border-radius: 5px; overflow: hidden; }
.char-hud .hp-fill { height: 100%; border-radius: 5px; transition: width .1s; }
.char-hud .hp-text { font-size: 11px; color: #ccc; margin-top: 2px; }
#hint { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); color: #888; font-size: 12px; pointer-events: none; z-index: 10; }
</style>
</head>
<body>
<div id="ui"><div class="hud" id="hud"></div></div>

  ctx.beginPath(); ctx.moveTo(cx-42*s, cy-54*s); ctx.lineTo(cx+8*s, cy-54*s); ctx.stroke(); ctx.lineWidth = 1;
  ctx.fillStyle = '#d4a070'; ctx.fillRect(cx-6*s, cy-72*s, 12*s, 6*s);
  ctx.fillStyle = '#d4a070'; ctx.beginPath(); ctx.arc(cx, cy-82*s, 13*s, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#3a2010'; ctx.fillRect(cx-7*s, cy-85*s, 4*s, 3*s); ctx.fillRect(cx+3*s, cy-85*s, 4*s, 3*s);
  ctx.fillStyle = '#6a3018';
  ctx.beginPath(); ctx.arc(cx, cy-85*s, 17*s, Math.PI*0.1, Math.PI*0.9); ctx.fill();
  ctx.fillRect(cx-17*s, cy-92*s, 34*s, 14*s);
  ctx.beginPath(); ctx.moveTo(cx-15*s,cy-92*s); ctx.lineTo(cx,cy-112*s); ctx.lineTo(cx+15*s,cy-92*s); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#e05010';
  ctx.beginPath(); ctx.moveTo(cx+9*s,cy-100*s); ctx.lineTo(cx+15*s,cy-112*s); ctx.lineTo(cx+11*s,cy-98*s); ctx.closePath(); ctx.fill();
}
const PORTRAIT_FNS = { warrior: portrait_warrior, golem: portrait_golem, shadow: portrait_shadow, mage: portrait_mage, archer: portrait_archer };

function drawSelectScreen() {
  // 背景
  const bgG = ctx.createLinearGradient(0, 0, 0, H);
  bgG.addColorStop(0,'#06040e'); bgG.addColorStop(0.5,'#0e0820'); bgG.addColorStop(1,'#04020a');
  ctx.fillStyle = bgG; ctx.fillRect(0, 0, W, H);
  // 光柱
  for (let k = 0; k < 5; k++) {
    const lx = W*0.1 + k*(W*0.2);
    const al = 0.035 + Math.sin(frameCount*0.012 + k)*0.018;
    const lg = ctx.createLinearGradient(lx,0,lx,H);
    lg.addColorStop(0,`rgba(180,140,255,${al})`); lg.addColorStop(0.5,`rgba(200,160,255,${al*1.5})`); lg.addColorStop(1,`rgba(180,140,255,${al})`);
    ctx.fillStyle = lg; ctx.fillRect(lx-W*0.04, 0, W*0.08, H);
  }
  // 粒子
  ctx.fillStyle = 'rgba(200,200,255,0.5)';
  for (let k=0;k<60;k++) {
    const px = (k*127 + frameCount*(k%3===0?0.4:k%3===1?-0.3:0.2)) % W;
    const py = (k*89 + frameCount*0.15) % H;
    ctx.beginPath(); ctx.arc(px, py, 1+(k%3)*0.5, 0, Math.PI*2); ctx.fill();
  }
  // 废墟剪影
  ctx.fillStyle = 'rgba(15,8,24,0.9)';
  for (let k=0;k<8;k++) {
    const rx=k*(W/7.5); const rh=H*(0.12+(k%3)*0.05);
    ctx.fillRect(rx, H-rh, W/8, rh);
    ctx.fillRect(rx+W/22, H-rh-H*0.04, W/30, H*0.04);
  }

  // 标题
  const tY = H * 0.12;
  const tGlow = ctx.createRadialGradient(W/2,tY,0,W/2,tY,W*0.22);
  tGlow.addColorStop(0,`rgba(180,120,255,${0.14+Math.sin(frameCount*0.05)*0.05})`); tGlow.addColorStop(1,'transparent');
  ctx.fillStyle = tGlow; ctx.fillRect(W/4, tY-H*0.09, W/2, H*0.18);
  const tSz = Math.min(H*0.08, 76);
  ctx.font = `bold ${tSz}px "PingFang SC","Microsoft YaHei",sans-serif`;
  ctx.textAlign = 'center';
  ctx.shadowBlur = 45; ctx.shadowColor = '#a070ff';
  ctx.strokeStyle = '#5020b0'; ctx.lineWidth = 9;
  ctx.strokeText('⚔️ 小人大乱斗', W/2, tY);
  ctx.lineWidth = 1;
  const tGrad = ctx.createLinearGradient(W/2-320,0,W/2+320,0);
  tGrad.addColorStop(0,'#c0a0ff'); tGrad.addColorStop(0.3,'#ffffff'); tGrad.addColorStop(0.7,'#ffd080'); tGrad.addColorStop(1,'#c0a0ff');
  ctx.fillStyle = tGrad; ctx.fillText('⚔️ 小人大乱斗', W/2, tY);
  ctx.shadowBlur = 0;
  ctx.font = `${Math.min(H*0.028,20)}px sans-serif`; ctx.fillStyle = '#7868a8';
  ctx.fillText('— 选择你的角色，决一胜负 —', W/2, tY + H*0.055);

  // 卡片
  const gap = Math.max(8, W*0.008);
  const padX = W * 0.032;
  const cardW = (W - padX*2 - gap*4) / 5;
  const cardH = H * 0.70;
  const cardTop = H * 0.20;
  const artH = cardH * 0.50;

  CHAR_KEYS.forEach((key, i) => {
    const def = CHAR_DEFS[key];
    const sel = playerCharKey === key;
    const cx = padX + i*(cardW+gap);
    ctx.save();
    if (sel) {
      const pivX = cx+cardW/2, pivY = cardTop+cardH/2;
      ctx.translate(pivX, pivY-cardH*0.022);
      ctx.scale(1.055, 1.055);
      ctx.translate(-pivX, -pivY);
    }
    // 卡片背景
    const cg = ctx.createLinearGradient(cx, cardTop, cx, cardTop+cardH);
    if (sel) { cg.addColorStop(0, def.color+'28'); cg.addColorStop(0.35,'#181030'); cg.addColorStop(1,'#09061a'); }
    else { cg.addColorStop(0,'#130c1e'); cg.addColorStop(1,'#07040d'); }
    ctx.shadowBlur = sel ? 40 : 8;
    ctx.shadowColor = sel ? def.color : 'rgba(0,0,0,0.9)';
    ctx.fillStyle = cg; ctx.fillRect(cx, cardTop, cardW, cardH);
    ctx.shadowBlur = 0;
    // 边框
    if (sel) {
      ctx.strokeStyle = def.color+'cc'; ctx.lineWidth = 2.5; ctx.strokeRect(cx, cardTop, cardW, cardH);
      ctx.strokeStyle = def.color+'33'; ctx.lineWidth = 9; ctx.strokeRect(cx-3, cardTop-3, cardW+6, cardH+6);
    } else {
      ctx.strokeStyle = '#241838'; ctx.lineWidth = 1; ctx.strokeRect(cx, cardTop, cardW, cardH);
    }
    ctx.lineWidth = 1;

    // 立绘区背景光
    const aGlow = ctx.createRadialGradient(cx+cardW/2, cardTop+artH*0.55, 0, cx+cardW/2, cardTop+artH*0.55, artH*0.6);
    aGlow.addColorStop(0, def.color+(sel?'35':'18')); aGlow.addColorStop(1,'transparent');
    ctx.fillStyle = aGlow; ctx.fillRect(cx, cardTop, cardW, artH);
    // 地面光晕
    const fGlow = ctx.createRadialGradient(cx+cardW/2, cardTop+artH, 0, cx+cardW/2, cardTop+artH, cardW*0.45);
    fGlow.addColorStop(0, def.color+'2a'); fGlow.addColorStop(1,'transparent');
    ctx.fillStyle = fGlow; ctx.fillRect(cx, cardTop+artH-22, cardW, 22);

    // 立绘
    ctx.save();
    ctx.beginPath(); ctx.rect(cx+2, cardTop+2, cardW-4, artH-2); ctx.clip();
    PORTRAIT_FNS[key](ctx, cx+cardW/2, cardTop+artH-8, artH*0.9);
    ctx.restore();

    // 分隔线
    const sepY = cardTop+artH;
    ctx.strokeStyle = sel ? def.color+'55' : '#20183a';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx+14, sepY); ctx.lineTo(cx+cardW-14, sepY); ctx.stroke();

    // 信息区
    const inf = sepY + cardH*0.026;
    const bX = cx + cardW*0.1;
    const bW2 = cardW*0.8;
    const fs = Math.min(cardW*0.175, 18);

    ctx.font = `bold ${fs}px "PingFang SC","Microsoft YaHei",sans-serif`;
    ctx.textAlign = 'center';
    if (sel) { ctx.shadowBlur = 14; ctx.shadowColor = def.color; }
    ctx.fillStyle = sel ? '#fff' : '#c8b8e0';
    ctx.fillText(def.name.replace(/^[^ ]+ /,''), cx+cardW/2, inf+cardH*0.042);
    ctx.shadowBlur = 0;

    ctx.font = `${Math.min(cardW*0.1,11)}px sans-serif`;
    ctx.fillStyle = sel ? def.color : '#5a4870';
    ctx.fillText(CHAR_LORE[key], cx+cardW/2, inf+cardH*0.085);

    // 属性条
    const barY = inf + cardH*0.13;
    const barH2 = Math.max(5, cardH*0.036);
    const barF = Math.max(9, barH2*1.1);
    ctx.font = `${barF}px sans-serif`;

    ctx.fillStyle = '#12091e'; ctx.fillRect(bX, barY, bW2, barH2);
    const hg = ctx.createLinearGradient(bX,0,bX+bW2,0);
    hg.addColorStop(0,'#2ecc71'); hg.addColorStop(1,'#27ae60');
    ctx.fillStyle = hg; ctx.fillRect(bX, barY, bW2*(def.hpMax/200), barH2);
    ctx.fillStyle = '#7878a0'; ctx.textAlign='left'; ctx.fillText('HP', bX, barY+barH2-1);
    ctx.textAlign='right'; ctx.fillText(def.hpMax, bX+bW2, barY+barH2-1);

    const sy2 = barY + barH2 + cardH*0.038;
    ctx.fillStyle = '#12091e'; ctx.fillRect(bX, sy2, bW2, barH2);
    const sg = ctx.createLinearGradient(bX,0,bX+bW2,0);
    sg.addColorStop(0,'#3498ff'); sg.addColorStop(1,'#2980b9');
    ctx.fillStyle = sg; ctx.fillRect(bX, sy2, bW2*(def.moveSpeed/7), barH2);
    ctx.fillStyle = '#7878a0'; ctx.textAlign='left'; ctx.fillText('速度', bX, sy2+barH2-1);
    ctx.textAlign='right'; ctx.fillText(def.moveSpeed, bX+sy2, sy2+barH2-1);

    // 技能
    const skTop = sy2 + barH2 + cardH*0.045;
    const skFs = Math.min(cardW*0.1, 11);
    const skH = cardH*0.068;
    [['J',def.attacks.normal],['K',def.attacks.skill1],['L',def.attacks.skill2]].forEach(([k2,atk],si)=>{
      const skY = skTop + si*skH;
      ctx.fillStyle = sel ? def.color+'2a' : '#150d22';
      ctx.fillRect(bX, skY, bW2, skH*0.82);
      ctx.strokeStyle = sel ? def.color+'55' : '#2a1f3a';
      ctx.lineWidth = 0.7; ctx.strokeRect(bX, skY, bW2, skH*0.82); ctx.lineWidth = 1;
      ctx.font = `bold ${skFs}px monospace`; ctx.textAlign='center';
      ctx.fillStyle = sel ? def.color : '#8a6aa0';
      ctx.fillText(k2, bX+cardW*0.07, skY+skH*0.6);
      ctx.font = `${skFs}px sans-serif`; ctx.textAlign='left';
      ctx.fillStyle = sel ? '#ddd' : '#7a6888';
      ctx.fillText(atk.name, bX+cardW*0.16, skY+skH*0.6);
    });

    // 选中提示
    if (sel) {
      ctx.shadowBlur = 10; ctx.shadowColor = def.color;
      ctx.fillStyle = def.color;
      ctx.font = `bold ${Math.min(cardW*0.12,13)}px sans-serif`;
      ctx.textAlign='center';
      ctx.fillText('▶ 已选择', cx+cardW/2, cardTop+cardH+cardH*0.042);
      ctx.shadowBlur = 0;
    }
    ctx.restore();
  });

  // 底部操控栏
  const ctrlY = H*0.935;
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(W/2-360, ctrlY-22, 720, 44);
  ctx.strokeStyle = 'rgba(150,120,200,0.3)';
  ctx.lineWidth = 1; ctx.strokeRect(W/2-360, ctrlY-22, 720, 44);
  ctx.font = `${Math.min(H*0.024,15)}px sans-serif`; ctx.textAlign='center';
  ctx.fillStyle = '#a090c0'; ctx.fillText('← → 切换角色', W/2-220, ctrlY+6);
  ctx.fillStyle = '#4a3868'; ctx.fillText('|', W/2-60, ctrlY+6);
  ctx.fillStyle = '#ffe066';
  ctx.font = `bold ${Math.min(H*0.028,17)}px sans-serif`;
  ctx.fillText('Enter / 空格  开始游戏', W/2+70, ctrlY+6);
}

// ─── 地图绘制 ─────────────────────────────────────────
function drawMap() {
  // ── 天空渐变（蓝紫到橙红）──
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#0a1840');
  bg.addColorStop(0.35, '#2a1060');
  bg.addColorStop(0.65, '#5a1830');
  bg.addColorStop(1, '#200810');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // 星星
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  for (let k = 0; k < 50; k++) {
    const sx = ((k * 233) % BASE_W) * scaleX;
    const sy = ((k * 97) % 220) * scaleY;
    const sr = (k % 3 === 0) ? 1.5 : 1;
    const twinkle = 0.5 + 0.5 * Math.sin(frameCount * 0.04 + k);
    ctx.globalAlpha = 0.3 + 0.7 * twinkle;
    ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // 远景山（彩色剪影）
  ctx.fillStyle = 'rgba(80,30,120,0.5)';
  for (let k = 0; k < 6; k++) {
    const mx = (k * 210) * scaleX, mw = 240 * scaleX, mh = (100 + k*18) * scaleY;
    ctx.beginPath(); ctx.moveTo(mx, H); ctx.lineTo(mx + mw/2, H - mh); ctx.lineTo(mx + mw, H); ctx.closePath(); ctx.fill();
  }
  ctx.fillStyle = 'rgba(160,60,60,0.35)';
  for (let k = 0; k < 5; k++) {
    const mx = (k*240+120)*scaleX, mw=200*scaleX, mh=(80+k*14)*scaleY;
    ctx.beginPath(); ctx.moveTo(mx,H); ctx.lineTo(mx+mw/2,H-mh); ctx.lineTo(mx+mw,H); ctx.closePath(); ctx.fill();
  }

  // 峡谷侧壁
  const wallL = ctx.createLinearGradient(0,0,80*scaleX,0);
  wallL.addColorStop(0,'#6a2040'); wallL.addColorStop(1,'transparent');
  ctx.fillStyle = wallL; ctx.fillRect(0, H*0.28, 80*scaleX, H*0.72);
  const wallR = ctx.createLinearGradient((BASE_W-80)*scaleX,0,BASE_W*scaleX,0);
  wallR.addColorStop(0,'transparent'); wallR.addColorStop(1,'#6a2040');
  ctx.fillStyle = wallR; ctx.fillRect((BASE_W-80)*scaleX, H*0.28, 80*scaleX, H*0.72);

  // 彩色石窟顶乳石
  const stalagColors = ['#8a3060','#603090','#304090','#308080'];
  for (let k = 0; k < 14; k++) {
    const sx = (k * 90) % BASE_W;
    const sh = 35 + (k * 23) % 55;
    ctx.fillStyle = stalagColors[k % stalagColors.length];
    ctx.beginPath();
    ctx.moveTo(sx * scaleX, 0);
    ctx.lineTo((sx + 22) * scaleX, sh * scaleY);
    ctx.lineTo((sx + 44) * scaleX, 0);
    ctx.closePath(); ctx.fill();
    // 发光尖
    ctx.fillStyle = 'rgba(255,200,255,0.4)';
    ctx.beginPath(); ctx.arc((sx+22)*scaleX, sh*scaleY, 3*scaleX, 0, Math.PI*2); ctx.fill();
  }

  // 熔岩深渊（x=360-840）
  const lavaX = 360*scaleX, lavaW = 480*scaleX, lavaY = 560*scaleY;
  // 深渊底部深色
  ctx.fillStyle = '#1a0510'; ctx.fillRect(lavaX, lavaY, lavaW, H - lavaY);
  // 熔岩层（动画）
  const lavaAnim = Math.sin(frameCount * 0.04) * 6;
  const lavaG = ctx.createLinearGradient(0, lavaY + 30*scaleY, 0, lavaY + 60*scaleY);
  lavaG.addColorStop(0, '#ff5500'); lavaG.addColorStop(0.5, '#ff2200'); lavaG.addColorStop(1, '#660000');
  ctx.fillStyle = lavaG; ctx.fillRect(lavaX, lavaY + (30+lavaAnim)*scaleY, lavaW, 40*scaleY);
  // 熔岩泡泡
  ctx.fillStyle = '#ff8800';
  for (let k = 0; k < 8; k++) {
    const bx = lavaX + ((k*71 + frameCount*0.5) % 460) * scaleX;
    const by = lavaY + (40 + Math.sin(frameCount*0.06+k)*8) * scaleY;
    ctx.beginPath(); ctx.arc(bx, by, (4+k%3)*scaleX, 0, Math.PI*2); ctx.fill();
  }
  // 发光边缘
  ctx.shadowBlur = 20; ctx.shadowColor = '#ff4400';
  ctx.strokeStyle = '#ff6600'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(lavaX, lavaY); ctx.lineTo(lavaX+lavaW, lavaY); ctx.stroke();
  ctx.shadowBlur = 0; ctx.lineWidth = 1;
  // 顶部辉光
  const lavaGlow = ctx.createLinearGradient(0, lavaY - 60*scaleY, 0, lavaY);
  lavaGlow.addColorStop(0,'transparent'); lavaGlow.addColorStop(1,'rgba(255,80,0,0.25)');
  ctx.fillStyle = lavaGlow; ctx.fillRect(lavaX, lavaY-60*scaleY, lavaW, 60*scaleY);

  // 平台
  for (const p of PLATFORMS) {
    const px = p.x*scaleX, py = p.y*scaleY, pw = p.w*scaleX, ph = p.h*scaleY;
    if (p.type === 'earth') {
      // 橙暖色大地
      const gg = ctx.createLinearGradient(0, py, 0, py+ph);
      gg.addColorStop(0,'#d86820'); gg.addColorStop(0.25,'#b85010'); gg.addColorStop(1,'#5a2008');
      ctx.fillStyle = gg; ctx.fillRect(px, py, pw, ph);
      // 顶面亮边
      ctx.fillStyle = '#f09040'; ctx.fillRect(px, py, pw, 4*scaleY);
      ctx.fillStyle = '#ffc070'; ctx.fillRect(px, py, pw, 2*scaleY);
      // 纹理
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      for (let k=0; k<6; k++) ctx.fillRect(px+(p.w*0.14*k+10)*scaleX, py+6*scaleY, 6*scaleX, (p.h-8)*scaleY);
    } else if (p.type === 'crystal') {
      // 青色水晶台
      const cg = ctx.createLinearGradient(0, py, 0, py+ph);
      cg.addColorStop(0,'#20d8e8'); cg.addColorStop(0.3,'#10a0b8'); cg.addColorStop(1,'#063850');
      ctx.fillStyle = cg; ctx.fillRect(px, py, pw, ph);
      // 发光顶面
      ctx.shadowBlur = 12; ctx.shadowColor = '#00eeff';
      ctx.fillStyle = '#70f0ff'; ctx.fillRect(px, py, pw, 3*scaleY);
      ctx.fillStyle = '#ffffff'; ctx.fillRect(px, py, pw, 1.5*scaleY);
      ctx.shadowBlur = 0;
      // 水晶菱形装饰
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      for (let k=0; k<3; k++) {
        const dx = px + (p.w*0.22*k+20)*scaleX;
        ctx.beginPath(); ctx.moveTo(dx, py); ctx.lineTo(dx+8*scaleX, py+8*scaleY); ctx.lineTo(dx, py+16*scaleY); ctx.lineTo(dx-8*scaleX, py+8*scaleY); ctx.closePath(); ctx.fill();
      }
    } else if (p.type === 'gold') {
      // 黄金古遗址中央台
      const gg = ctx.createLinearGradient(0, py, 0, py+ph);
      gg.addColorStop(0,'#f0c030'); gg.addColorStop(0.3,'#c89020'); gg.addColorStop(1,'#5a3a08');
      ctx.fillStyle = gg; ctx.fillRect(px, py, pw, ph);
      ctx.shadowBlur = 14; ctx.shadowColor = '#ffd700';
      ctx.fillStyle = '#ffe060'; ctx.fillRect(px, py, pw, 3*scaleY);
      ctx.fillStyle = '#ffffff'; ctx.fillRect(px, py, pw, 1.5*scaleY);
      ctx.shadowBlur = 0;
      // 古纹装饰
      ctx.strokeStyle = 'rgba(255,200,50,0.4)'; ctx.lineWidth = 1;
      ctx.strokeRect(px+6*scaleX, py+4*scaleY, pw-12*scaleX, ph-6*scaleY);
      ctx.lineWidth = 1;
    } else if (p.type === 'ruin') {
      // 紫色废墟
      const rg = ctx.createLinearGradient(0, py, 0, py+ph);
      rg.addColorStop(0,'#9050d0'); rg.addColorStop(0.3,'#6030a0'); rg.addColorStop(1,'#250a40');
      ctx.fillStyle = rg; ctx.fillRect(px, py, pw, ph);
      ctx.shadowBlur = 10; ctx.shadowColor = '#c080ff';
      ctx.fillStyle = '#c080ff'; ctx.fillRect(px, py, pw, 3*scaleY);
      ctx.shadowBlur = 0;
      // 破碎缺角（右侧）
      ctx.fillStyle = '#0a0810';
      ctx.fillRect(px+pw-10*scaleX, py, 10*scaleX, 8*scaleY);
    }
  }
}

// ─── 角色绘制函数 ─────────────────────────────────────
function drawHuman(ctx, e, bodyColor, headColor) {
  const x = e.x * scaleX, y = e.y * scaleY;
  const w = e.w * scaleX, h = e.h * scaleY;
  const dir = e.dir;
  const atk = e.attacking > 0;
  // 影子
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.ellipse(x, (e.y + e.h + 2) * scaleY, w * 0.5, 4 * scaleY, 0, 0, Math.PI*2);
  ctx.fill();
  // 腿（走路摆动）
  const legPhase = frameCount * 0.2;
  const legSwing = e.onGround && (Math.abs(e.vx) > 0.2) ? Math.sin(legPhase) * 6 * scaleY : 0;
  ctx.fillStyle = bodyColor;
  ctx.fillRect(x - w*0.22, y + h*0.58 + legSwing, w*0.2, h*0.38);
  ctx.fillRect(x + w*0.02, y + h*0.58 - legSwing, w*0.2, h*0.38);
  // 身体
  ctx.fillStyle = bodyColor;
  ctx.fillRect(x - w*0.4, y + h*0.28, w*0.8, h*0.4);
  // 头
  ctx.fillStyle = headColor;
  ctx.beginPath();
  ctx.arc(x, y + h*0.15, w*0.38, 0, Math.PI*2);
  ctx.fill();
  // 攻击手臂延伸
  if (atk) {
    ctx.fillStyle = headColor;
    ctx.fillRect(x + dir*w*0.3, y + h*0.35, dir*w*0.6, h*0.12);
  }
  // 伤害状态闪红
  if (e.stunTime > 0) {
    ctx.fillStyle = 'rgba(255,0,0,0.4)';
    ctx.fillRect(x - w/2, y, w, h);
  }
  if (e.frozenTime > 0) {
    ctx.fillStyle = 'rgba(100,200,255,0.45)';
    ctx.fillRect(x - w/2, y, w, h);
  }
  // 玩家标识
  if (e.isPlayer) {
    ctx.fillStyle = '#ffe066';
    ctx.font = `${Math.max(10, 11 * Math.min(scaleX, scaleY))}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('▼', x, (e.y - 10) * scaleY);
  }
}

function drawWarrior(ctx, e) {
  drawHuman(ctx, e, '#2260a8', '#ffd4a3');
  // 剑
  const dir = e.dir;
  const x = e.x * scaleX, y = e.y * scaleY, h = e.h * scaleY, w = e.w * scaleX;
  const swing = e.attacking > 0 ? dir * 0.6 : 0;
  ctx.save();
  ctx.translate(x + dir*w*0.3, y + h*0.35);
  ctx.rotate(swing);
  ctx.fillStyle = '#c8c8c8';
  ctx.fillRect(0, -3*scaleY, dir*28*scaleX, 4*scaleY);
  ctx.fillStyle = '#d4af37';
  ctx.fillRect(-4*scaleX, -5*scaleY, 8*scaleX, 8*scaleY);
  ctx.restore();
}
function drawGolem(ctx, e) {
  const x = e.x * scaleX, y = e.y * scaleY;
  const w = e.w * scaleX, h = e.h * scaleY;
  ctx.fillStyle = '#2a2a2a';
  ctx.fillRect(x - w*0.4, y + h*0.6, w*0.8, h*0.4); // 腿
  ctx.fillStyle = '#4a3f30';
  ctx.fillRect(x - w*0.48, y + h*0.25, w*0.96, h*0.46); // 体
  ctx.fillStyle = '#5a4f40';
  ctx.beginPath();
  ctx.arc(x, y + h*0.15, w*0.45, 0, Math.PI*2); ctx.fill(); // 头
  // 纹路
  ctx.strokeStyle = '#2a1a10'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(x - w*0.2, y + h*0.3); ctx.lineTo(x + w*0.2, y + h*0.55);
  ctx.stroke(); ctx.lineWidth = 1;
  // 眼
  ctx.fillStyle = '#ff4400';
  ctx.fillRect(x - w*0.18, y + h*0.1, w*0.12, w*0.12);
  ctx.fillRect(x + w*0.06, y + h*0.1, w*0.12, w*0.12);
  if (e.stunTime > 0) { ctx.fillStyle = 'rgba(255,0,0,0.4)'; ctx.fillRect(x - w/2, y, w, h); }
  if (e.frozenTime > 0) { ctx.fillStyle = 'rgba(100,200,255,0.45)'; ctx.fillRect(x - w/2, y, w, h); }
}
function drawShadow(ctx, e) {
  const x = e.x * scaleX, y = e.y * scaleY;
  const w = e.w * scaleX, h = e.h * scaleY;
  ctx.globalAlpha = 0.92;
  drawHuman(ctx, e, '#5a2a7a', '#2a1a3a');
  ctx.globalAlpha = 1;
  // 匕首
  const dir = e.dir;
  ctx.fillStyle = '#cce8ff';
  ctx.fillRect(x + dir*w*0.2, y + h*0.38, dir*22*scaleX, 3*scaleY);
  if (e.stunTime > 0) { ctx.fillStyle = 'rgba(255,0,0,0.4)'; ctx.fillRect(x - w/2, y, w, h); }
  if (e.frozenTime > 0) { ctx.fillStyle = 'rgba(100,200,255,0.45)'; ctx.fillRect(x - w/2, y, w, h); }
}
function drawMage(ctx, e) {
  drawHuman(ctx, e, '#1a6a5a', '#c8e8ff');
  const x = e.x * scaleX, y = e.y * scaleY;
  const w = e.w * scaleX, h = e.h * scaleY;
  // 法杖
  ctx.fillStyle = '#8a5a2a';
  ctx.fillRect(x + e.dir*w*0.2, y + h*0.2, e.dir*5*scaleX, h*0.55);
  ctx.fillStyle = '#00eeff';
  ctx.beginPath();
  ctx.arc(x + e.dir*(w*0.22 + 2*scaleX), y + h*0.18, 6*scaleX, 0, Math.PI*2);
  ctx.fill();
  if (e.stunTime > 0) { ctx.fillStyle = 'rgba(255,0,0,0.4)'; ctx.fillRect(x - w/2, y, w, h); }
  if (e.frozenTime > 0) { ctx.fillStyle = 'rgba(100,200,255,0.45)'; ctx.fillRect(x - w/2, y, w, h); }
}
function drawArcher(ctx, e) {
  drawHuman(ctx, e, '#8a4010', '#ffd4a3');
  const x = e.x * scaleX, y = e.y * scaleY;
  const w = e.w * scaleX, h = e.h * scaleY;
  // 弓
  const dir = e.dir;
  ctx.strokeStyle = '#8a6030'; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x + dir*6*scaleX, y + h*0.35, 12*scaleY, -Math.PI*0.55, Math.PI*0.55, dir < 0);
  ctx.stroke(); ctx.lineWidth = 1;
  if (e.attacking > 0) {
    ctx.fillStyle = '#ffdd44';
    ctx.fillRect(x + dir*4*scaleX, y + h*0.34, dir*20*scaleX, 2*scaleY);
  }
  if (e.stunTime > 0) { ctx.fillStyle = 'rgba(255,0,0,0.4)'; ctx.fillRect(x - w/2, y, w, h); }
  if (e.frozenTime > 0) { ctx.fillStyle = 'rgba(100,200,255,0.45)'; ctx.fillRect(x - w/2, y, w, h); }
}

// ─── 物理 ─────────────────────────────────────────────
function applyPhysics(e) {
  if (!e.alive) return;
  if (e.frozenTime > 0) { e.frozenTime--; return; }
  e.vy += GRAVITY;
  e.x += e.vx + e.dashVx;
  e.y += e.vy;
  e.dashVx *= 0.7;
  if (Math.abs(e.dashVx) < 0.1) e.dashVx = 0;
  e.vx *= 0.82;
  // 平台碰撞
  e.onGround = false;
  for (const p of PLATFORMS) {
    const prevBottom = e.y + e.h - e.vy;
    if (e.x + e.w/2 > p.x && e.x - e.w/2 < p.x + p.w &&
        e.y + e.h >= p.y && prevBottom <= p.y + 4 && e.vy >= 0) {
      e.y = p.y - e.h;
      e.vy = 0;
      e.onGround = true;
      e.jumpsLeft = 2;
    }
  }
  // 出界检测
  if (e.x < BOUNDS.left || e.x > BOUNDS.right || e.y > BOUNDS.bottom) {
    e.hp = 0;
    e.alive = false;
  }
}

// ─── 攻击逻辑 ─────────────────────────────────────────
function doAttack(attacker, atkKey) {
  const def = CHAR_DEFS[attacker.charKey];
  const atk = def.attacks[atkKey];
  if (!atk || attacker.attackCd[atkKey] > 0 || attacker.stunTime > 0 || attacker.frozenTime > 0) return;
  attacker.attacking = atk.duration;
  attacker.attackType = atkKey;
  attacker.attackCd[atkKey] = atk.cd;
  const dir = attacker.dir;

  // 位移型技能
  if (atk.dash) {
    attacker.dashVx = dir * 14;
    attacker.vy = -5;
  }
  if (atk.spinJump) {
    attacker.vy = -14;
  }
  if (atk.backjump) {
    attacker.vy = -13;
    attacker.dashVx = -dir * 10;
  }

  // 射弹型
  if (atk.projectile || atk.pierce || atk.freeze || atk.bounce) {
    let spd = 10;
    if (attacker.charKey === 'golem') spd = 7;
    const pj = {
      x: attacker.x + dir * attacker.w, y: attacker.y + attacker.h * 0.35,
      vx: dir * spd, vy: -1,
      ownerId: attacker.id, dmg: atk.dmg, knockback: atk.knockback,
      life: Math.floor(atk.range / spd),
      pierce: !!atk.pierce,
      freeze: !!atk.freeze,
      bounce: !!atk.bounce,
      bounceCount: atk.bounce ? 3 : 0,
      charKey: attacker.charKey,
      type: atkKey,
    };
    projectiles.push(pj);
    return; // 近战伤害在下面
  }

  // 地震踏
  if (atk.quake) {
    effects.push({ type: 'quake', x: attacker.x, y: attacker.y + attacker.h, life: 30, r: 10 });
    entities.forEach(target => {
      if (target.id === attacker.id || !target.alive) return;
      const dist = Math.abs(target.x - attacker.x);
      if (target.onGround && dist < atk.range) {
        const ratio = 1 - dist / atk.range;
        hitEntity(target, attacker, atk.dmg * ratio, atk.knockback * ratio, attacker.dir);
        target.vy = -8;
      }
    });
    return;
  }

  // 闪现背刺
  if (atk.blink) {
    const target = nearestEnemy(attacker);
    if (target) {
      attacker.x = target.x - dir * (attacker.w + 5);
    }
  }

  // 近战（含旋风、连刺等）
  const hits = atk.hits || 1;
  entities.forEach(target => {
    if (target.id === attacker.id || !target.alive) return;
    const dx = (target.x - attacker.x) * dir;
    const dy = Math.abs(target.y + target.h/2 - (attacker.y + attacker.h/2));
    if (dx > -10 && dx < atk.range && dy < (attacker.h + target.h) * 0.6) {
      for (let h = 0; h < hits; h++) {
        hitEntity(target, attacker, atk.dmg, atk.knockback, dir);
      }
      if (atk.backstab && dir !== target.dir) hitEntity(target, attacker, atk.dmg, 4, dir);
    }
  });
}

function nearestEnemy(from) {
  let best = null, bestD = 9999;
  entities.forEach(e => {
    if (e.id === from.id || !e.alive) return;
    const d = Math.hypot(e.x - from.x, e.y - from.y);
    if (d < bestD) { bestD = d; best = e; }
  });
  return best;
}

function hitEntity(target, attacker, dmg, knockback, dir) {
  if (!target.alive || target.stunTime > 4) return;
  target.hp = Math.max(0, target.hp - Math.ceil(dmg));
  target.vx = dir * knockback;
  target.vy = -4;
  target.stunTime = 14;
  effects.push({ type: 'hit', x: target.x, y: target.y + target.h/2, life: 12 });
  if (target.hp <= 0) target.alive = false;
}

// ─── AI ───────────────────────────────────────────────
function updateAI(e) {
  if (!e.ai || !e.alive) return;
  const ai = e.ai;
  if (ai.actionCd > 0) { ai.actionCd--; return; }
  // 找最近目标（优先玩家）
  const target = entities.find(en => en.isPlayer && en.alive) || nearestEnemy(e);
  if (!target) return;
  const dx = target.x - e.x;
  const dist = Math.abs(dx);
  e.dir = dx > 0 ? 1 : -1;

  const def = CHAR_DEFS[e.charKey];
  const hp_ratio = e.hp / e.hpMax;

  // 远程角色保持距离
  const preferRange = ['mage', 'archer'].includes(e.charKey);
  const safeRange = preferRange ? 280 : 80;

  // 跳跃
  if (ai.jumpCd <= 0 && e.onGround) {
    if (target.y < e.y - 60) { // 目标在更高平台
      e.vy = def.jumpForce;
      ai.jumpCd = 60;
    } else if (Math.random() < 0.015) { // 随机跳跃
      e.vy = def.jumpForce;
      ai.jumpCd = 80;
    }
  }
  if (ai.jumpCd > 0) ai.jumpCd--;

  // 移动
  if (dist > safeRange) {
    e.vx = e.dir * def.moveSpeed * 0.8;
  } else if (preferRange && dist < safeRange * 0.5) {
    e.vx = -e.dir * def.moveSpeed * 0.6; // 拉开距离
  }

  // 攻击决策
  const atkDefs = def.attacks;
  if (dist < atkDefs.normal.range + 20 && e.attackCd.normal <= 0) {
    doAttack(e, 'normal');
    ai.actionCd = 20 + Math.floor(Math.random() * 30);
  } else if (e.attackCd.skill1 <= 0 && Math.random() < 0.02) {
    doAttack(e, 'skill1');
    ai.actionCd = 30;
  } else if (e.attackCd.skill2 <= 0 && hp_ratio < 0.5 && Math.random() < 0.015) {
    doAttack(e, 'skill2');
    ai.actionCd = 30;
  }
}

// ─── 输入 ─────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  keys[k] = true;

  if (gameState === 'select') {
    if (k === 'arrowleft' || k === 'a') {
      const i = CHAR_KEYS.indexOf(playerCharKey);
      playerCharKey = CHAR_KEYS[(i - 1 + CHAR_KEYS.length) % CHAR_KEYS.length];
    } else if (k === 'arrowright' || k === 'd') {
      const i = CHAR_KEYS.indexOf(playerCharKey);
      playerCharKey = CHAR_KEYS[(i + 1) % CHAR_KEYS.length];
    } else if (k === 'enter' || k === ' ') {
      startGame();
    }
    return;
  }

  if (gameState === 'result' || (gameState === 'playing' && (k === 'r'))) {
    gameState = 'select';
    return;
  }

  if (gameState !== 'playing') return;
  const player = entities.find(e => e.isPlayer);
  if (!player || !player.alive) return;

  const def = CHAR_DEFS[player.charKey];
  if ((k === 'w' || k === 'arrowup' || k === ' ') && player.jumpsLeft > 0) {
    player.vy = player.jumpsLeft === 2 ? def.jumpForce : def.jumpForce * 0.85;
    player.jumpsLeft--;
    keys['w'] = keys['W'] = keys['arrowup'] = keys[' '] = false;
  }
  if (k === 'j') doAttack(player, 'normal');
  if (k === 'k') doAttack(player, 'skill1');
  if (k === 'l') doAttack(player, 'skill2');
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// 选角点击
cv.addEventListener('click', ev => {
  if (gameState !== 'select') return;
  const total = CHAR_KEYS.length;
  const bW = Math.min(SELECT_BOX_W, W / total - 20);
  const bH = Math.min(SELECT_BOX_H, H * 0.52);
  const totalW = total * bW + (total - 1) * 20;
  const startX = (W - totalW) / 2;
  const bY = H * 0.28;
  CHAR_KEYS.forEach((key, i) => {
    const bX = startX + i * (bW + 20);
    if (ev.clientX >= bX && ev.clientX <= bX + bW && ev.clientY >= bY && ev.clientY <= bY + bH * 1.1) {
      if (playerCharKey === key) startGame();
      else playerCharKey = key;
    }
  });
});

// ─── 开始游戏 ─────────────────────────────────────────
function startGame() {
  entities = [];
  projectiles = [];
  effects = [];
  hazards = [];
  hazardTimer = 0;
  frameCount = 0;

  entities.push(makeEntity(playerCharKey, 170, 520, true, 0));

  const others = CHAR_KEYS.filter(k => k !== playerCharKey);
  const aiKeys = others.sort(() => Math.random() - 0.5).slice(0, 3);
  // AI 出生在三个有平台支撑的位置
  const aiSpawns = [
    { x: 1000, y: 520 },  // 右地面
    { x: 330,  y: 412 },  // 左水晶台（y=450-38=412）
    { x: 870,  y: 412 },  // 右水晶台
  ];
  aiKeys.forEach((key, i) => {
    entities.push(makeEntity(key, aiSpawns[i].x, aiSpawns[i].y, false, i + 1));
  });

  buildHUD();
  gameState = 'playing';
}

function buildHUD() {
  const hud = document.getElementById('hud');
  hud.innerHTML = '';
  entities.forEach(e => {
    const def = CHAR_DEFS[e.charKey];
    const div = document.createElement('div');
    div.className = 'char-hud';
    div.id = `hud-${e.id}`;
    div.innerHTML = `
      <div class="name" style="color:${e.isPlayer ? '#ffe066' : '#ccc'}">${e.isPlayer ? '▼ ' : ''}${def.name}</div>
      <div class="hp-bar"><div class="hp-fill" id="hp-fill-${e.id}" style="width:100%;background:${def.color}"></div></div>
      <div class="hp-text" id="hp-text-${e.id}">${e.hp}/${e.hpMax}</div>
    `;
    hud.appendChild(div);
  });
}

function updateHUD() {
  entities.forEach(e => {
    const fill = document.getElementById(`hp-fill-${e.id}`);
    const text = document.getElementById(`hp-text-${e.id}`);
    if (!fill) return;
    const ratio = Math.max(0, e.hp / e.hpMax) * 100;
    fill.style.width = ratio + '%';
    if (text) text.textContent = e.alive ? `${e.hp}/${e.hpMax}` : '💀';
  });
}

// ─── 环境机关 ──────────────────────────────────────────
function spawnHazard() {
  const type = Math.random() < 0.6 ? 'rock' : 'bat';
  if (type === 'rock') {
    hazards.push({
      type: 'rock',
      x: 100 + Math.random() * 1000,
      y: -40, vy: 2, dmg: 10, r: 16, life: 400,
    });
  } else {
    hazards.push({
      type: 'bat',
      x: Math.random() < 0.5 ? -40 : BASE_W + 40,
      y: 180 + Math.random() * 200,
      vx: Math.random() < 0.5 ? 3.5 : -3.5,
      dmg: 8, r: 14, life: 180,
    });
  }
}

function updateHazards() {
  hazardTimer++;
  if (hazardTimer % 200 === 0) spawnHazard();
  for (let i = hazards.length - 1; i >= 0; i--) {
    const h = hazards[i];
    h.life--;
    if (h.type === 'rock') {
      h.vy += 0.3; h.y += h.vy;
      if (h.y > BASE_H + 60) { hazards.splice(i, 1); continue; }
    } else {
      h.x += h.vx;
      if (h.x < -80 || h.x > BASE_W + 80) { hazards.splice(i, 1); continue; }
    }
    if (h.life <= 0) { hazards.splice(i, 1); continue; }
    // 碰到角色
    entities.forEach(e => {
      if (!e.alive) return;
      if (Math.hypot(e.x - h.x, (e.y + e.h/2) - h.y) < h.r + e.w/2) {
        hitEntity(e, null, h.dmg, 3, h.vx >= 0 ? 1 : -1);
        hazards.splice(i, 1);
      }
    });
  }
}

function drawHazards() {
  for (const h of hazards) {
    const hx = h.x * scaleX, hy = h.y * scaleY;
    if (h.type === 'rock') {
      ctx.fillStyle = '#5a4a3a';
      ctx.beginPath(); ctx.arc(hx, hy, h.r * scaleX, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#3a2a1a';
      ctx.fillRect(hx - 5*scaleX, hy - 3*scaleY, 4*scaleX, 3*scaleY);
      // 警告线
      ctx.strokeStyle = 'rgba(255,200,0,0.5)';
      ctx.setLineDash([4, 4]);
      ctx.beginPath(); ctx.moveTo(hx, 0); ctx.lineTo(hx, hy - h.r * scaleY);
      ctx.stroke(); ctx.setLineDash([]);
    } else {
      ctx.fillStyle = '#2a1a3a';
      ctx.beginPath(); ctx.ellipse(hx, hy, h.r * scaleX, 8 * scaleY, 0, 0, Math.PI*2); ctx.fill();
      const wf = Math.sin(Date.now() / 80) * 4 * scaleY;
      ctx.beginPath();
      ctx.moveTo(hx - 8*scaleX, hy); ctx.lineTo(hx - 20*scaleX, hy - 6*scaleY + wf);
      ctx.lineTo(hx - 12*scaleX, hy + 4*scaleY);
      ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(hx + 8*scaleX, hy); ctx.lineTo(hx + 20*scaleX, hy - 6*scaleY + wf);
      ctx.lineTo(hx + 12*scaleX, hy + 4*scaleY);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(hx - 8*scaleX, hy - 4*scaleY, 3*scaleX, 3*scaleY);
      ctx.fillRect(hx + 5*scaleX, hy - 4*scaleY, 3*scaleX, 3*scaleY);
    }
  }
}

// ─── 投射物 ───────────────────────────────────────────
function updateProjectiles() {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.vx; p.y += p.vy;
    p.life--;
    if (p.life <= 0) { projectiles.splice(i, 1); continue; }
    // 平台碰撞
    let hitPlatform = false;
    for (const pl of PLATFORMS) {
      if (p.x > pl.x && p.x < pl.x + pl.w && p.y + 4 >= pl.y && p.y < pl.y + pl.h) {
        hitPlatform = true;
        break;
      }
    }
    if (hitPlatform && !p.pierce) {
      if (p.bounce && p.bounceCount > 0) {
        p.vy = -Math.abs(p.vy) * 0.9;
        p.bounceCount--;
      } else {
        effects.push({ type: 'hit', x: p.x, y: p.y, life: 10 });
        projectiles.splice(i, 1);
        continue;
      }
    }
    // 命中角色
    let spliced = false;
    for (const target of entities) {
      if (target.id === p.ownerId || !target.alive) continue;
      if (Math.abs(target.x - p.x) < target.w/2 + 8 && Math.abs(target.y + target.h/2 - p.y) < target.h/2 + 8) {
        if (p.freeze) target.frozenTime = 90;
        hitEntity(target, null, p.dmg, p.knockback, p.vx > 0 ? 1 : -1);
        effects.push({ type: 'hit', x: p.x, y: p.y, life: 12 });
        if (!p.pierce) { projectiles.splice(i, 1); spliced = true; break; }
      }
    }
    if (!spliced) p.vy += 0.18; // 重力微弱
  }
}

function drawProjectiles() {
  for (const p of projectiles) {
    const px = p.x * scaleX, py = p.y * scaleY;
    if (p.charKey === 'mage' || p.type === 'skill1') {
      ctx.fillStyle = p.freeze ? '#44eeff' : '#1abc9c';
      ctx.beginPath(); ctx.arc(px, py, 8 * scaleX, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(px - 2*scaleX, py - 2*scaleY, 3 * scaleX, 0, Math.PI*2); ctx.fill();
    } else if (p.charKey === 'archer') {
      ctx.strokeStyle = '#ffdd44'; ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(px - p.vx * scaleX * 2.5, py - p.vy * scaleY * 2.5);
      ctx.lineTo(px, py);
      ctx.stroke(); ctx.lineWidth = 1;
    } else if (p.charKey === 'golem') {
      ctx.fillStyle = '#5a4a3a';
      ctx.beginPath(); ctx.arc(px, py, 12 * scaleX, 0, Math.PI*2); ctx.fill();
    }
    if (p.bounce) {
      ctx.fillStyle = '#ffee00';
      ctx.beginPath(); ctx.arc(px, py, 8 * scaleX, 0, Math.PI*2); ctx.fill();
    }
  }
}

// ─── 特效 ─────────────────────────────────────────────
function updateEffects() {
  for (let i = effects.length - 1; i >= 0; i--) {
    effects[i].life--;
    if (effects[i].type === 'quake') effects[i].r += 6;
    if (effects[i].life <= 0) effects.splice(i, 1);
  }
}

function drawEffects() {
  for (const ef of effects) {
    if (ef.type === 'hit') {
      const alpha = ef.life / 12;
      ctx.strokeStyle = `rgba(255,220,80,${alpha})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(ef.x * scaleX, ef.y * scaleY, (12 - ef.life) * 2 * scaleX, 0, Math.PI*2);
      ctx.stroke(); ctx.lineWidth = 1;
    } else if (ef.type === 'quake') {
      ctx.fillStyle = `rgba(180,120,40,${ef.life / 30 * 0.4})`;
      ctx.beginPath();
      ctx.ellipse(ef.x * scaleX, ef.y * scaleY, ef.r * scaleX, 12 * scaleY, 0, 0, Math.PI*2);
      ctx.fill();
    }
  }
}

// ─── 主要 update ─────────────────────────────────────
function update() {
  if (gameState !== 'playing') return;
  frameCount++;

  // 玩家移动
  const player = entities.find(e => e.isPlayer && e.alive);
  if (player) {
    const def = CHAR_DEFS[player.charKey];
    if ((keys['a'] || keys['arrowleft']) && player.stunTime <= 0) {
      player.vx = -def.moveSpeed; player.dir = -1;
    } else if ((keys['d'] || keys['arrowright']) && player.stunTime <= 0) {
      player.vx = def.moveSpeed; player.dir = 1;
    }
  }

  // CD 倒数 + 状态倒数
  entities.forEach(e => {
    if (!e.alive) return;
    ['normal', 'skill1', 'skill2'].forEach(k => { if (e.attackCd[k] > 0) e.attackCd[k]--; });
    if (e.attacking > 0) e.attacking--;
    if (e.stunTime > 0) e.stunTime--;
    applyPhysics(e);
    updateAI(e);
  });

  updateHazards();
  updateProjectiles();
  updateEffects();
  updateHUD();

  // 胜负判断（至少 3 秒后才判定，避免生成bug导致瞬间结束）
  const alive = entities.filter(e => e.alive);
  if (alive.length <= 1 && frameCount > 180) {
    if (alive.length === 1) {
      const winner = alive[0];
      const def = CHAR_DEFS[winner.charKey];
      resultMsg = winner.isPlayer
        ? `🎉 你赢了！${def.name} 是最后的胜者！`
        : `💀 ${def.name} 赢了！按 R 重新开始`;
    } else {
      resultMsg = '🤝 平局！按 R 重新开始';
    }
    gameState = 'result';
  }
}

// ─── 绘制 ─────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  if (gameState === 'select') {
    drawSelectScreen();
    return;
  }

  drawMap();
  drawHazards();
  drawEffects();

  // 角色
  entities.forEach(e => {
    if (!e.alive) return;
    CHAR_DEFS[e.charKey].draw(ctx, e);
  });

  drawProjectiles();

  // 出界警告区域（半透明紫色）
  ctx.fillStyle = 'rgba(120,0,180,0.12)';
  ctx.fillRect(0, 0, 60 * scaleX, H);
  ctx.fillRect((BASE_W - 60) * scaleX, 0, 60 * scaleX, H);

  // 结果画面
  if (gameState === 'result') {
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.floor(H * 0.07)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(resultMsg, W/2, H/2);
    ctx.font = `${Math.floor(H * 0.035)}px sans-serif`;
    ctx.fillStyle = '#aaa';
    ctx.fillText('按 R 返回选角', W/2, H/2 + H * 0.1);
  }
}

// ─── 主循环 ───────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
